{% extends "base.html" %}
{% block title %}New estimate{% endblock %}
{% block content %}
<h1>New estimate</h1>
{% if error %}<p class="error">{{ error }}</p>{% endif %}
<form method="post">
  <div class="formgrid" style="max-width:720px">
    <label>Customer</label>
    <select name="customer_id" id="customer_id" onchange="toggleNewCustomer(this)">
      <option value="">— New customer (enter below) —</option>
      {% for c in customers %}<option value="{{ c.id }}">{{ c.name }}</option>{% endfor %}
    </select>
    <label class="nc-field">New customer name</label>
    <input class="nc-field" type="text" name="new_customer_name" placeholder="Person or business the estimate is for">
    <label class="nc-field">New customer email</label>
    <input class="nc-field" type="email" name="new_customer_email" placeholder="name@example.com — optional, for emailing the estimate">
    <label>Estimate date</label><input type="date" name="date" value="{{ today }}" required>
    <label>Valid until</label><input type="date" name="valid_until" value="{{ today }}" required>
    <label>Memo (shown on estimate)</label><input type="text" name="memo" style="width:100%">
  </div>

  <h2>Line items</h2>
  <table id="items" style="max-width:720px">
    <tr><th>Description</th><th style="width:80px">Qty</th><th style="width:120px">Unit price ($)</th><th style="width:48px" title="Charge sales tax on this line">Tax</th></tr>
    <tr>
      <td>
        {% if standard_items %}
        <select name="item_id" class="item-select" onchange="onItemSelect(this)" style="width:100%; margin-bottom: 4px;">
          <option value="">-- Choose a Product/Service --</option>
          {% for item in standard_items %}
            <option value="{{ item.id }}" data-desc="{{ item.description }}" data-price="{{ item.unit_cents|money }}" data-taxable="{{ 1 if item.taxable else 0 }}">{{ item.name }}</option>
          {% endfor %}
        </select>
        {% endif %}
        <input type="text" name="item_desc" style="width:100%" placeholder="Line description">
      </td>
      <td><input type="number" name="item_qty" value="1" step="0.25" min="0" style="width:70px"></td>
      <td><input type="text" name="item_price" placeholder="0.00" style="width:100px"></td>
      <td style="text-align:center">
        <input type="checkbox" class="tax-check" onchange="syncTax(this)">
        <input type="hidden" name="item_taxable" value="0">
      </td>
    </tr>
  </table>
  <div class="toolbar">
    <button type="button" class="ghost" onclick="addRow()">+ Add line</button>
    <button type="submit">Create estimate</button>
  </div>
</form>
<script>
/* Catalog bootstrap for the shared line-item editor (behavior in static/line-items.js). */
window.standardItems = [
  {% for item in standard_items %}
    { id: {{ item.id }}, name: {{ item.name|tojson }}, description: {{ item.description|tojson }}, price: "{{ item.unit_cents|money }}", taxable: {{ 1 if item.taxable else 0 }} },
  {% endfor %}
];
window.incomeAccounts = [
  {% for a in income_accounts %}{ id: {{ a.id }}, name: {{ a.name|tojson }} },{% endfor %}
];
</script>
<script>
/* Show the "new customer" name/email fields only when no existing customer is picked. */
function toggleNewCustomer(sel){
  var show = !sel.value;
  document.querySelectorAll('.nc-field').forEach(function(el){ el.style.display = show ? '' : 'none'; });
}
document.addEventListener('DOMContentLoaded', function(){ toggleNewCustomer(document.getElementById('customer_id')); });
</script>
{% endblock %}
